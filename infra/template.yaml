AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AI Trends Explorer — Full infrastructure stack.
  ECS Fargate + RDS PostgreSQL + ALB + S3/CloudFront + EventBridge + SES.

# ═══════════════════════════════════════════════════════════
# Parameters
# ═══════════════════════════════════════════════════════════

Parameters:
  Project:
    Type: String
    Default: ai-trends
    Description: Project name prefix for all resources

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  # ─── Database ────────────────────────────────────────
  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS instance type (db.t4g.micro is free-tier eligible)

  DBName:
    Type: String
    Default: ai_trends

  DBUsername:
    Type: String
    Default: trends

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: PostgreSQL master password

  # ─── ECS / Fargate ──────────────────────────────────
  ContainerCpu:
    Type: Number
    Default: 512
    Description: Fargate CPU units (512 = 0.5 vCPU)

  ContainerMemory:
    Type: Number
    Default: 2048
    Description: Fargate memory in MiB

  DesiredCount:
    Type: Number
    Default: 1

  ContainerImage:
    Type: String
    Default: ""
    Description: >
      Full ECR image URI (e.g., 123456789.dkr.ecr.eu-west-1.amazonaws.com/ai-trends-prod:latest).
      Leave empty on first deploy — the ECR repo is created first, then build & push, then update this.

  # ─── API Keys ────────────────────────────────────────
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for Claude

  GroqApiKey:
    Type: String
    NoEcho: true
    Description: Groq API key for Llama

  GithubToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: GitHub PAT for trending API

  # ─── Email ──────────────────────────────────────────
  SESEmail:
    Type: String
    Default: ""
    Description: Email to verify in SES (leave empty to skip)

Conditions:
  HasContainerImage: !Not [!Equals [!Ref ContainerImage, ""]]
  HasSESEmail: !Not [!Equals [!Ref SESEmail, ""]]

# ═══════════════════════════════════════════════════════════
# Resources
# ═══════════════════════════════════════════════════════════

Resources:

  # ─────────────────────────────────────────────────────────
  # VPC + Networking
  # ─────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-igw"

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ─── Public Subnets ─────────────────────────────────

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-public-2"

  # ─── Private Subnets ────────────────────────────────

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-private-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-private-2"

  # ─── NAT Gateway (single, to save costs) ────────────

  NATElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NATGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: IGWAttachment
    Properties:
      AllocationId: !GetAtt NATElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-nat"

  # ─── Route Tables ───────────────────────────────────

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-private-rt"

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ─────────────────────────────────────────────────────────
  # Security Groups
  # ─────────────────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP/HTTPS to ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-alb-sg"

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from ALB to ECS tasks
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-ecs-sg"

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL from ECS and Lambda
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-rds-sg"

  # ─────────────────────────────────────────────────────────
  # RDS PostgreSQL (pgvector supported on RDS PG 15+)
  # ─────────────────────────────────────────────────────────

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for RDS
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-db-subnet"

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${Project}-${Environment}-db"
      Engine: postgres
      EngineVersion: "16.4"
      DBInstanceClass: !Ref DBInstanceClass
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: 20
      MaxAllocatedStorage: 50
      StorageType: gp3
      StorageEncrypted: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      MultiAZ: false
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      EnablePerformanceInsights: true
      Tags:
        - Key: Name
          Value: !Sub "${Project}-${Environment}-db"

  # ─────────────────────────────────────────────────────────
  # ECR Repository
  # ─────────────────────────────────────────────────────────

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${Project}-${Environment}-agent-service"
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Remove untagged images after 7 days",
              "selection": {
                "tagStatus": "untagged",
                "countType": "sinceImagePushed",
                "countUnit": "days",
                "countNumber": 7
              },
              "action": { "type": "expire" }
            }]
          }

  # ─────────────────────────────────────────────────────────
  # Secrets Manager
  # ─────────────────────────────────────────────────────────

  APIKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${Project}-${Environment}-api-keys"
      Description: API keys for LLM providers
      SecretString: !Sub |
        {
          "ANTHROPIC_API_KEY": "${AnthropicApiKey}",
          "GROQ_API_KEY": "${GroqApiKey}",
          "GITHUB_TOKEN": "${GithubToken}",
          "DB_PASSWORD": "${DBPassword}"
        }

  # ─────────────────────────────────────────────────────────
  # ECS Cluster + Fargate Service
  # ─────────────────────────────────────────────────────────

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${Project}-${Environment}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${Project}-${Environment}-agent-service"
      RetentionInDays: 14

  # ─── IAM: Task Execution Role ───────────────────────

  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Project}-${Environment}-ecs-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref APIKeysSecret

  # ─── IAM: Task Role (running container) ─────────────

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Project}-${Environment}-ecs-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendEmail
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  # ─── Task Definition ────────────────────────────────

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Condition: HasContainerImage
    Properties:
      Family: !Sub "${Project}-${Environment}-agent-service"
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: agent-service
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: DB_HOST
              Value: !GetAtt RDSInstance.Endpoint.Address
            - Name: DB_PORT
              Value: "5432"
            - Name: DB_NAME
              Value: !Ref DBName
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: LANGCHAIN_TRACING_V2
              Value: "true"
            - Name: LANGCHAIN_PROJECT
              Value: ai-trends-explorer
          Secrets:
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "${APIKeysSecret}:ANTHROPIC_API_KEY::"
            - Name: GROQ_API_KEY
              ValueFrom: !Sub "${APIKeysSecret}:GROQ_API_KEY::"
            - Name: GITHUB_TOKEN
              ValueFrom: !Sub "${APIKeysSecret}:GITHUB_TOKEN::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "${APIKeysSecret}:DB_PASSWORD::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:8000/health\")' || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 120

  # ─── ALB ─────────────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${Project}-${Environment}-alb"
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${Project}-${Environment}-tg"
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckPort: "8000"
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckTimeoutSeconds: 10
      HealthCheckIntervalSeconds: 30
      Matcher:
        HttpCode: "200"

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ─── ECS Service ─────────────────────────────────────

  ECSService:
    Type: AWS::ECS::Service
    Condition: HasContainerImage
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub "${Project}-${Environment}-agent-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: agent-service
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup

  # ─────────────────────────────────────────────────────────
  # S3 + CloudFront (Dashboard)
  # ─────────────────────────────────────────────────────────

  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Project}-${Environment}-dashboard-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${Project}-${Environment}-dashboard-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: AI Trends Explorer Dashboard
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt DashboardBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Restrictions:
          GeoRestriction:
            RestrictionType: none

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFront
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${DashboardBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ─────────────────────────────────────────────────────────
  # EventBridge Scheduler (replaces n8n cron)
  # ─────────────────────────────────────────────────────────

  # Lambda shim that POSTs to the ALB endpoints
  TriggerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Project}-${Environment}-trigger-lambda"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  TriggerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Project}-${Environment}-trigger"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt TriggerLambdaRole.Arn
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds:
          - !Ref ECSSecurityGroup
      Environment:
        Variables:
          API_URL: !Sub "http://${ALB.DNSName}"
      Code:
        ZipFile: |
          import json
          import os
          import urllib.request

          def handler(event, context):
              api_url = os.environ["API_URL"]
              endpoint = event.get("endpoint", "/pipeline/daily")
              url = f"{api_url}{endpoint}"

              req = urllib.request.Request(url, method="POST", data=b"")
              req.add_header("Content-Type", "application/json")

              try:
                  with urllib.request.urlopen(req, timeout=300) as resp:
                      body = resp.read().decode()
                      print(f"[{endpoint}] {resp.status}: {body[:500]}")
                      return {"statusCode": resp.status, "body": body[:500]}
              except Exception as e:
                  print(f"[{endpoint}] Error: {e}")
                  return {"statusCode": 500, "body": str(e)}

  # ─── Scheduler IAM Role ─────────────────────────────

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Project}-${Environment}-scheduler"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt TriggerLambda.Arn

  # ─── Schedules ──────────────────────────────────────

  DailyIngestSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${Project}-${Environment}-daily-ingest"
      ScheduleExpression: "cron(0 6 * * ? *)"
      ScheduleExpressionTimezone: Europe/Madrid
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt TriggerLambda.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: '{"endpoint": "/pipeline/daily"}'

  WeeklyBriefingSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${Project}-${Environment}-weekly-briefing"
      ScheduleExpression: "cron(0 8 ? * FRI *)"
      ScheduleExpressionTimezone: Europe/Madrid
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt TriggerLambda.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: '{"endpoint": "/pipeline/weekly"}'

  MonthlyReportSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${Project}-${Environment}-monthly-report"
      ScheduleExpression: "cron(0 8 1 * ? *)"
      ScheduleExpressionTimezone: Europe/Madrid
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt TriggerLambda.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: '{"endpoint": "/pipeline/monthly"}'

  # ─────────────────────────────────────────────────────────
  # SES (optional)
  # ─────────────────────────────────────────────────────────

  SESEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Condition: HasSESEmail
    Properties:
      EmailIdentity: !Ref SESEmail

# ═══════════════════════════════════════════════════════════
# Outputs
# ═══════════════════════════════════════════════════════════

Outputs:
  APIURL:
    Description: Agent service API URL (ALB)
    Value: !Sub "http://${ALB.DNSName}"

  DashboardURL:
    Description: Dashboard URL (CloudFront)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  ECRRepositoryURL:
    Description: ECR repository URI — docker push here
    Value: !GetAtt ECRRepository.RepositoryUri

  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address

  RDSPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt RDSInstance.Endpoint.Port

  DashboardBucketName:
    Description: S3 bucket for dashboard files
    Value: !Ref DashboardBucket

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster

  ECSServiceName:
    Condition: HasContainerImage
    Description: ECS service name
    Value: !GetAtt ECSService.Name
