<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trends Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 2rem; }
        .card { background: #1e293b; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.25rem; margin-bottom: 0.75rem; color: #38bdf8; }
        .score { display: inline-block; background: #334155; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.875rem; margin-right: 0.5rem; }
        .score.high { background: #166534; }
        .score.mid { background: #854d0e; }
        .score.low { background: #7f1d1d; }
        .report-content { line-height: 1.6; white-space: pre-wrap; }
        .status { padding: 0.5rem 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .status.ok { background: #166534; }
        .status.error { background: #7f1d1d; }
        button { background: #3b82f6; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-right: 0.5rem; margin-bottom: 0.5rem; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #reports { margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Trends Explorer</h1>
        <p class="subtitle">Multi-agent AI intelligence system — ESADE PDAI Project</p>

        <div id="health" class="status">Checking API connection...</div>

        <div class="card">
            <h2>Actions</h2>
            <button onclick="runPipeline('daily')">Run Daily Pipeline</button>
            <button onclick="runPipeline('weekly')">Generate Weekly Report</button>
            <button onclick="runPipeline('monthly')">Generate Monthly Report</button>
            <button onclick="loadReports()">Refresh Reports</button>
        </div>

        <div id="reports"></div>
    </div>

    <script>
        const API = 'http://localhost:8000';

        async function checkHealth() {
            try {
                const res = await fetch(`${API}/health`);
                const data = await res.json();
                const el = document.getElementById('health');
                el.textContent = `API: ${data.status} | DB: ${data.db_connected ? 'connected' : 'disconnected'} | Items: ${data.items_count} | Reports: ${data.reports_count}`;
                el.className = `status ${data.db_connected ? 'ok' : 'error'}`;
            } catch {
                document.getElementById('health').textContent = 'API not reachable — start the server with: uv run uvicorn agent_service.main:app --port 8000';
                document.getElementById('health').className = 'status error';
            }
        }

        async function runPipeline(type) {
            const endpoint = type === 'daily' ? '/pipeline/daily' : `/pipeline/${type}`;
            try {
                const res = await fetch(`${API}${endpoint}`, { method: 'POST' });
                const data = await res.json();
                alert(`Pipeline complete! Check the reports tab.`);
                loadReports();
            } catch (e) {
                alert(`Error: ${e.message}`);
            }
        }

        async function loadReports() {
            try {
                const res = await fetch(`${API}/reports?report_type=weekly&limit=5`);
                const reports = await res.json();
                const container = document.getElementById('reports');
                if (!reports.length) {
                    container.innerHTML = '<div class="card"><p>No reports yet. Run a pipeline first.</p></div>';
                    return;
                }
                container.innerHTML = reports.map(r => `
                    <div class="card">
                        <h2>${r.title}</h2>
                        <span class="score ${r.quality_score >= 7 ? 'high' : r.quality_score >= 5 ? 'mid' : 'low'}">
                            Quality: ${r.quality_score?.toFixed(1) ?? 'N/A'}
                        </span>
                        <span class="score">Revisions: ${r.revision_count}</span>
                        <span class="score">${r.report_type}</span>
                        <div class="report-content">${r.content_md}</div>
                    </div>
                `).join('');
            } catch {
                document.getElementById('reports').innerHTML = '<div class="card"><p>Could not load reports.</p></div>';
            }
        }

        checkHealth();
        loadReports();
    </script>
</body>
</html>
